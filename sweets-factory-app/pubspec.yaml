name: sweets_factory_app
description: تطبيق إدارة مصنع حلويات وطرد متكامل مع ERPNext
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  http: ^1.2.2
  provider: ^6.1.2
  image_picker: ^1.1.2
  file_picker: ^8.1.2
  shared_preferences: ^2.2.3
  connectivity_plus: ^6.0.5
  intl: ^0.19.0
  flutter_local_notifications: ^17.2.3
  cached_network_image: ^3.4.1

  # UI & Animations
  flutter_animate: ^4.5.0
  shimmer: ^3.0.0
  lottie: ^3.1.2
  google_fonts: ^6.2.1

  # Icons
  cupertino_icons: ^1.0.8

  # State Management
  # provider already included

  # Utilities
  equatable: ^2.0.5
  collection: ^1.18.0

  # Navigation & Actions
  go_router: ^14.2.7
  url_launcher: ^6.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true

  # الخطوط العربية
  fonts:
    - family: Cairo
      fonts:
        - asset: assets/fonts/Cairo-Regular.ttf
        - asset: assets/fonts/Cairo-Medium.ttf
          weight: 500
        - asset: assets/fonts/Cairo-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Cairo-Bold.ttf
          weight: 700
        - asset: assets/fonts/Cairo-ExtraBold.ttf
          weight: 800

  assets:
    - assets/images/
    - assets/icons/
