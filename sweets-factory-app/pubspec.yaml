name: sweets_factory_app
description: تطبيق إدارة مصنع حلويات وطرد متكامل مع ERPNext
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  http: ^1.2.0
  provider: ^6.1.1
  image_picker: ^1.0.7
  file_picker: ^6.1.1
  shared_preferences: ^2.2.2
  connectivity_plus: ^5.0.2
  intl: ^0.19.0
  flutter_local_notifications: ^17.1.0
  cached_network_image: ^3.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
